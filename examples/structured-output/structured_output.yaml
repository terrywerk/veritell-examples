schema_version: v1
name: public_structured_output_refund_policy
description: Public structured output example that validates JSON format and schema compliance.
input:
  question: "Return the refund policy as JSON."
context:
  schemas:
    refund_policy_schema:
      type: object
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            type: string
          minItems: 1
      required:
        - answer
        - citations
      additionalProperties: false
assertions:
  - type: response_format_valid
    params:
      format: json
  - type: json_schema_valid
    params:
      schema_ref: refund_policy_schema
metadata:
  tags:
    - public-example
    - structured-output
    - json
  mock_response: '{"answer":"Refunds are allowed within 30 days of purchase.","citations":["refund_policy_v1"]}'

